name: Collect Azure snapshot

on:
  schedule:
    - cron: "0 21 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: azure-snapshot-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Sign in to Azure with OIDC
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install Resource Graph extension
        run: az extension add --name resource-graph --only-show-errors
      - name: Collect directly into a sanitized candidate
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          OUTPUT_PATH: .candidate/snapshot.json
        run: npm run collect:azure
      - name: Validate candidate schema, evidence, and privacy
        run: |
          npx tsx scripts/validate-public-data.ts .candidate/snapshot.json
          npx tsx scripts/privacy-scan.ts .candidate
      - name: Promote candidate in the ephemeral checkout
        run: cp .candidate/snapshot.json public/data/snapshot.json
      - name: Open review-gated snapshot pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- public/data/snapshot.json; then
            echo "No sanitized snapshot change."
            exit 0
          fi
          branch="automation/azure-snapshot-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add public/data/snapshot.json
          git commit -m "Update sanitized Azure operations snapshot"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Update sanitized Azure operations snapshot" \
            --body "Automated read-only Azure collection. The candidate passed schema, evidence, and privacy gates. Review is required before this public data can be published."
