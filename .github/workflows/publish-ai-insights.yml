name: Publish validated AI insights

on:
  workflow_run:
    workflows: ["Azure Ops Pulse evidence-bound analysis"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: publish-ai-insights
  cancel-in-progress: false

jobs:
  validate:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Download validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-ai-insights
          path: .candidate
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Verify candidate artifact scope
        run: |
          mapfile -t candidate_files < <(find .candidate -type f -printf '%P\n' | sort)
          if [ "${#candidate_files[@]}" -ne 1 ] || [ "${candidate_files[0]}" != "snapshot.json" ]; then
            printf 'Candidate artifact must contain only snapshot.json:\n'
            printf '%s\n' "${candidate_files[@]}"
            exit 1
          fi
          test ! -L .candidate/snapshot.json
      - name: Install deterministic validation dependencies
        run: npm ci --ignore-scripts
      - name: Repeat schema, evidence, baseline, and privacy gates
        run: |
          npx tsx scripts/validate-public-data.ts .candidate/snapshot.json --insights-only --baseline=public/data/snapshot.json
          npx tsx scripts/privacy-scan.ts .candidate
      - name: Upload trusted candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trusted-ai-insights
          path: .candidate/snapshot.json
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Download trusted candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trusted-ai-insights
          path: .candidate
      - name: Promote validated candidate
        run: cp .candidate/snapshot.json public/data/snapshot.json
      - name: Open human-review draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- public/data/snapshot.json; then
            echo "No validated AI insight change."
            exit 0
          fi
          branch="automation/ai-insights-${{ github.event.workflow_run.id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add public/data/snapshot.json
          git commit -m "Update validated public AI insights"
          git push origin "$branch"
          gh pr create \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "[ai-insights] Update validated public insights" \
            --body "The agent produced a sanitized candidate artifact. This deterministic publisher repeated schema, exact numeric evidence, baseline-diff, and privacy validation. Human review is required."
